<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Cocktail Constellation</title>
  <meta name="description" content="Explore the cocktail graph through a mobile-first constellation map.">
  <meta name="theme-color" content="#0b1020">
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="icon" href="./icons/icon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="./app.css">
</head>
<body>
  <div id="app" class="app-shell" data-state="loading">
    <div class="background-lights" aria-hidden="true">
      <div class="background-light light-one" data-light-index="0"></div>
      <div class="background-light light-two" data-light-index="1"></div>
      <div class="background-light light-three" data-light-index="2"></div>
    </div>

    <header class="hud">
      <div class="nav-row">
        <button id="backBtn" class="icon-button" type="button" aria-label="Go back" disabled>
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M19 12H5"></path>
            <path d="m12 19-7-7 7-7"></path>
          </svg>
        </button>

        <div class="header-actions">
          <button id="listToggleBtn" class="icon-button" type="button" aria-label="Saved cocktails" aria-expanded="false" disabled>
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M8 6h13"></path>
              <path d="M8 12h13"></path>
              <path d="M8 18h13"></path>
              <path d="M3 6h.01"></path>
              <path d="M3 12h.01"></path>
              <path d="M3 18h.01"></path>
            </svg>
          </button>

          <button id="randomBtn" class="icon-button" type="button" aria-label="Random cocktail" disabled>
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <polyline points="23 4 23 10 17 10"></polyline>
              <polyline points="1 20 1 14 7 14"></polyline>
              <path d="M3.51 9A9 9 0 0 1 18.36 5.64L23 10"></path>
              <path d="M20.49 15A9 9 0 0 1 5.64 18.36L1 14"></path>
            </svg>
          </button>

          <div id="searchShell" class="search-shell" data-open="false">
            <div class="search-input-wrap">
              <input
                id="searchInput"
                type="search"
                inputmode="search"
                enterkeyhint="search"
                placeholder="Search cocktails or ingredients"
                aria-hidden="true"
                disabled
              >
            </div>
            <button id="searchToggleBtn" class="icon-button" type="button" aria-label="Search cocktails" aria-expanded="false" disabled>
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <circle cx="11" cy="11" r="8"></circle>
                <path d="m21 21-4.3-4.3"></path>
              </svg>
            </button>
          </div>
        </div>
      </div>
    </header>

    <main id="graph" class="graph" aria-live="polite">
      <svg id="lines" xmlns="http://www.w3.org/2000/svg" aria-hidden="true"></svg>
      <div class="center-wrap">
        <section class="center-card" id="centerCard">
          <h1 class="title">Loading constellation</h1>
          <p class="helper-copy">Fetching the graph and move map from JSON files.</p>
        </section>
      </div>
      <div id="nodesLayer" class="nodes-layer"></div>
      <div id="transitionLayer" class="transition-layer" aria-hidden="true"></div>
      <div id="loadingOverlay" class="loading-overlay">
        <div class="loading-panel">
          <div class="spinner" aria-hidden="true"></div>
          <p id="loadingMessage">Loading cocktail graph…</p>
        </div>
      </div>
    </main>

    <div id="favoritesBackdrop" class="favorites-backdrop" hidden></div>
    <aside id="favoritesPanel" class="favorites-panel" hidden aria-hidden="true" aria-label="Saved cocktails">
      <div id="favoritesList" class="favorites-list"></div>
    </aside>
    <aside id="searchPanel" class="search-panel" hidden aria-hidden="true" aria-label="Search results">
      <div id="searchResults" class="search-results"></div>
    </aside>
  </div>

  <div id="status" class="sr-only" aria-live="polite">Loading cocktail graph…</div>

  <noscript>
    <div class="noscript-banner">JavaScript is required to explore the cocktail constellation.</div>
  </noscript>

  <script type="module" src="./app.js"></script>
</body>
</html>
